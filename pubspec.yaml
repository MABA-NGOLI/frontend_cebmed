name: frontend_cebmed
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.6.0
  provider: ^6.1.5+1
  local_auth: ^3.0.1
  share_plus: ^12.0.2
  file_picker: ^8.1.2
  image_picker: ^1.1.2
  shared_preferences: ^2.5.5
  intl: ^0.20.2
  table_calendar: ^3.2.0
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0
  flutter_local_notifications: ^21.0.0
  permission_handler: ^11.3.1
  path_provider: ^2.1.4
  timezone: ^0.11.0
  syncfusion_flutter_pdfviewer: ^28.2.12
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon_cebmed.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
      - assets/images/logo.png
      - assets/images/logo_text.png
      - assets/images/logo_two.png
      - assets/images/card_docs.png
      - assets/images/card_stock.png
  fonts:
      - family: Grandstander
        fonts:
         - asset: assets/fonts/Grandstander-Regular.ttf

      - family: Montserrat
        fonts:
         - asset: assets/fonts/Montserrat-SemiBold.ttf
           weight: 600

         - asset: assets/fonts/Montserrat-Bold.ttf
           weight: 700

         - asset: assets/fonts/Montserrat-ExtraBold.ttf
           weight: 800

         - asset: assets/fonts/Montserrat-SemiBoldItalic.ttf
           weight: 600
           style: italic

         - asset: assets/fonts/Montserrat-BoldItalic.ttf
           weight: 700
           style: italic

         - asset: assets/fonts/Montserrat-ExtraBoldItalic.ttf
           weight: 800
           style: italic

